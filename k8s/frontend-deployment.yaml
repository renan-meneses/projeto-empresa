apiVersion: apps/v1
kind: Deployment
metadata:
  name: empresa-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: empresa-frontend
  template:
    metadata:
      labels:
        app: empresa-frontend
    spec:
      containers:
      - name: frontend
        image: empresa-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: empresa-frontend
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
